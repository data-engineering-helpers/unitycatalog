#
# File: https://github.com/data-engineering-helpers/unitycatalog/blob/main/.github/workflows/docker-build.yml
# Fork of https://github.com/unitycatalog/unitycatalog/blob/main/.github/workflows/disabled_docker-build.yml
#
# On Docker Hub:
# * Forked repo: https://hub.docker.com/r/infrahelpers/unitycatalog
# * Original repo: https://hub.docker.com/r/unitycatalog/unitycatalog
#
name: Build and Push Docker Images - unitycatalog

on:
  push:
    tags:
      - "v*"
    branches:
      - main
      - feat-*
    paths:
      - build/**
      - project/**
      - examples/**
      - server/**
      - api/**
      - clients/**
      - version.sbt
      - build.sbt
      - Dockerfile
  pull_request:
    branches:
      - main
      - feat-*
    paths:
      - build/**
      - project/**
      - examples/**
      - server/**
      - api/**
      - clients/**
      - version.sbt
      - build.sbt
      - Dockerfile
  workflow_dispatch:

env:
  IMAGE: infrahelpers/unitycatalog

jobs:
  docker-cli-test:
    name: Docker CLI Sanity Check
    #if: false  # Disabled to prevent supply chain attacks; remove this line to restore

    # https://github.com/data-engineering-helpers/unitycatalog/settings/environments/14294668701/edit
    environment: docker-hub

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Build Docker Image
        run: docker build -t unitycatalog-test:local .

      - name: Start Container
        run: docker run -d --name unitycatalog-test-container unitycatalog-test:local

      - name: Wait for Container to be Ready
        run: sleep 5

      - name: Test CLI Command
        run: docker exec unitycatalog-test-container ./bin/uc --help

      - name: Cleanup
        if: always()
        run: |
          docker stop unitycatalog-test-container || true
          docker rm unitycatalog-test-container || true

  build-and-push:
    needs: docker-cli-test
    #if: false  # Disabled to prevent supply chain attacks; remove this line to restore

    # https://github.com/data-engineering-helpers/unitycatalog/settings/environments/14294668701/edit
    environment: docker-hub

    runs-on: ubuntu-latest

    steps:
      # https://github.com/actions/checkout
      - name: Checkout Repository
        #uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        uses: actions/checkout@v6

      # Required for multi-arch builds - https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        #uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        uses: docker/setup-qemu-action@v4

      # https://github.com/docker/login-action
      - name: Login to Docker Hub
        # if: ${{ contains(fromJSON('["push", "workflow_dispatch"]'), github.event_name) && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') }}
        #uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        #uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        uses: docker/setup-buildx-action@v4

      # https://github.com/docker/metadata-action
      # Will generate tags for the image
      # For ref/tags/*: latest, <tag>
      # For refs/heads/main: main, main-<short-sha>
      - name: Generate Metadata and Tags
        id: meta
        #uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,enable=${{ github.ref == 'refs/heads/main' }},prefix={{branch}}-
            type=sha,event=branch,prefix={{branch}}-
            type=sha,event=branch,prefix=unitycatalog-main-
            type=ref,event=branch,prefix=unitycatalog-main

      # Cross-platform emulator collection distributed with Docker images:
      # https://github.com/tonistiigi/binfmt
      - name: Run privileged
        run: sudo docker run --privileged --rm tonistiigi/binfmt --install arm64

      # https://github.com/docker/build-push-action
      - name: Build and Push Docker Image
        # if: ${{ contains(fromJSON('["push", "workflow_dispatch"]'), github.event_name) && (startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main') }}
        #uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        uses: docker/build-push-action@v7
        with:
          context: .
          # Push only tagged releases to registry. Eg. the git ref
          # "refs/tags/v0.2.0" would result the tagged image
          # "unitycatalog/unitycatalog:v0.2.0".
          # See here for more info: https://tinyurl.com/yh8252m2
          push: true
          provenance: mode=max
          sbom: true
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          # Use github actions cache: https://docs.docker.com/build/cache/backends/gha/
          cache-from: type=gha
          cache-to: type=gha,mode=max
